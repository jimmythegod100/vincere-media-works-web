<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Message Sent — Vincere Media Works</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0a; --text: #f5f5f5; --muted: #9ca3af; --red: #dc2626; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .logo { width: 80px; margin: 0 auto 2rem; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    p { color: var(--muted); max-width: 420px; line-height: 1.7; margin: 0 auto 2rem; }
    a {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-weight: 700;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
    }
    a:hover { background: #ef4444; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="images/icon.png" alt="Vincere Media Works">
    <h1>Message received</h1>
    <p>Thanks for reaching out. We'll review your inquiry and reply within 24–48 hours at the email you provided.</p>
    <a href="index.html">Back to site</a>
  </main>
</body>
</html>
